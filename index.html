  {t:"내가 원하는 것을 요청하는 것이 얼마나 힘든가요?",c:"식당에서 서비스 요청, 친구에게 도움 요청 등 일상적인 상황을 떠올려 보세요.",o:[{l:"상대방이 귀찮아할 것 같아 웬만하면 그냥 참는다",s:3},{l:"필요한 건 말하지만 미안한 마음이 앞선다",s:2},{l:"상황에 따라 다르지만 필요하면 요청할 수 있다",s:1},{l:"필요한 것은 자연스럽게 요청하는 편이다",s:0}]},
  {t:"칭찬이나 인정을 받지 못하면 어떤가요?",c:"열심히 한 일이 그냥 지나쳤을 때, 노력이 당연하게 여겨졌을 때를 떠올려 보세요.",o:[{l:"섭섭하고 불안해지며 내가 부족한 게 아닐까 생각한다",s:3},{l:"아쉽지만 그럴 수 있다고 넘기려 노력한다",s:2},{l:"별로 신경 쓰이지 않는다",s:0},{l:"스스로 자신의 노력을 인정하는 편이다",s:0}]},
  {t:"관계에서 내가 더 많이 주고 있다는 느낌이 드나요?",c:"가족, 친구, 직장 관계에서 에너지 균형을 떠올려 보세요.",o:[{l:"자주 그런 느낌이 든다. 그래도 내가 더 챙겨야 한다고 생각한다",s:3},{l:"그런 편이지만 불만을 표현하기 어렵다",s:2},{l:"가끔 그런 느낌이 들면 이야기를 나눈다",s:1},{l:"주고받음이 비교적 균형 잡혀 있다",s:0}]},
  {t:"나는 '나다운 모습'이 언제인지 알고 있나요?",c:"역할을 벗어난 순간, 혼자 있는 순간의 나를 떠올려 보세요.",o:[{l:"솔직히 잘 모르겠다. 늘 상황에 맞춰 사는 것 같다",s:3},{l:"대략은 알지만 실제로 그렇게 사는 시간이 많지 않다",s:2},{l:"어느 정도 알고 있고 그 순간이 있다",s:1},{l:"나다운 순간이 명확하게 있고 그 시간을 소중히 한다",s:0}]},
  {t:"어린 시절, 집 분위기를 읽고 행동을 조절한 적이 있나요?",c:"부모님의 기분, 집안 분위기를 파악하고 그에 맞게 행동했던 기억을 떠올려 보세요.",o:[{l:"자주 그랬다. 어른들의 기분을 살피며 내 행동을 맞췄다",s:3},{l:"가끔 그런 편이었다",s:2},{l:"별로 그러지 않았다",s:1},{l:"그런 기억이 없다",s:0}]}
];

var RT=[
  {r:[0,8],b:"낮은 순응 패턴",bc:"#d4edba",bt:"#1a4a00",dc:"#4a9c1a",t:"나를 꽤 잘 지키고 있어요",e:"🌱",d:"상대방의 감정이나 반응에 크게 흔들리지 않고 자신의 기준과 필요를 꽤 잘 인식하고 있어요. 경계를 세우는 데 어려움이 적고, 관계에서 비교적 자기 자신으로 있을 수 있는 편입니다.",tr:["경계 설정에 큰 어려움이 없는 편","자신의 감정과 욕구를 인식하는 편","갈등 상황에서 도망치기보다 직면하는 편"]},
  {r:[9,17],b:"중간 순응 패턴",bc:"#faeeda",bt:"#6b3500",dc:"#c47f1a",t:"조금씩 나를 잃고 있는 중",e:"🌀",d:"어느 정도 자신을 지키면서도 상대방의 기분이나 반응을 의식해 자신을 조율하는 경우가 적지 않습니다. '착한 사람'이라는 말을 자주 듣지만, 속으로는 쌓이는 억울함이나 피로감이 있을 수 있어요.",tr:["거절이 어렵고 이후에 죄책감이 남는 편","상대 눈치를 보며 행동을 조절하는 경우 있음","감정을 억누르고 나중에 터뜨리는 패턴 가능성"]},
  {r:[18,24],b:"높은 순응 패턴",bc:"#faece7",bt:"#7a2a10",dc:"#c04a20",t:"나보다 관계를 먼저 챙기고 있어요",e:"🪞",d:"오랜 시간 동안 타인의 기분과 필요를 최우선으로 여기며 살아온 패턴이 강하게 나타납니다. 이것은 나쁜 성격이 아니라, 한때 필요했던 생존 전략이었을 수 있습니다.",tr:["관계에서 항상 맞춰주는 역할을 담당","내 감정과 욕구를 인식하기 어려울 수 있음","억눌린 분노나 피로가 쌓여 있을 가능성"]},
  {r:[25,30],b:"매우 높은 순응 패턴",bc:"#fbeaf0",bt:"#7a2040",dc:"#b03060",t:"'나'는 어디 있나요?",e:"💧",d:"관계에서 자신을 지워온 시간이 꽤 길었을 수 있습니다. 타인의 필요와 감정을 돌보는 것이 너무 자연스러워서, 내가 무엇을 원하는지조차 잘 모를 수 있어요.",tr:["자신의 욕구와 감정을 인식하기 매우 어려움","상대방의 분노나 불만에 극도로 예민하게 반응","갈등을 피하기 위해 자기 자신을 축소시킴","관계에서 항상 '지불하는 사람' 역할"]}
];

var cq=0,sel=null,score=0;

function startQ(){
  document.getElementById('si').classList.remove('on');
  document.getElementById('sq').classList.add('on');
  renderQ();
}

function renderQ(){
  var q=QS[cq];
  document.getElementById('pf').style.width=(cq/10*100)+'%';
  document.getElementById('pt').textContent=(cq+1)+' / 10';
  document.getElementById('qn').textContent='질문 '+(cq+1);
  document.getElementById('qt').textContent=q.t;
  document.getElementById('qc').textContent=q.c;
  var ol=document.getElementById('olist'); ol.innerHTML='';
  ['A','B','C','D'].forEach(function(l,i){
    var b=document.createElement('button'); b.className='op';
    b.innerHTML='<span class="oltr">'+l+'</span><span>'+q.o[i].l+'</span>';
    b.onclick=function(){
      document.querySelectorAll('.op').forEach(function(x){x.classList.remove('sel');});
      b.classList.add('sel'); sel=i;
      document.getElementById('nb').classList.add('on');
    };
    ol.appendChild(b);
  });
  sel=null;
  var nb=document.getElementById('nb'); nb.classList.remove('on');
  nb.textContent=(cq===9?'결과 보기':'다음')+' →';
}

function nextQ(){
  if(sel===null)return;
  score+=QS[cq].o[sel].s;
  if(cq<9){cq++;renderQ();}else showResult();
}

function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('sq').classList.remove('on');
  document.getElementById('sres').classList.add('on');
  var r=RT.find(function(x){return score>=x.r[0]&&score<=x.r[1];})||RT[3];
  var pct=Math.round(score/30*100);

  var img=document.createElement('img');
  img.src=COVER; img.alt='포닝 책 표지';
  img.style.cssText='width:68px;height:102px;border-radius:6px;object-fit:cover;flex-shrink:0;border:1px solid #333';

  var imgIdx=RT.indexOf(r)+1;
  document.getElementById('rc').innerHTML=
    '<img src="result'+imgIdx+'.png" alt="'+r.t+'" style="width:100%;border-radius:12px;margin-bottom:1.25rem;display:block">'+
    '<div style="margin-bottom:.75rem"><span class="rbadge" style="background:'+r.bc+';color:'+r.bt+'">'+r.b+'</span></div>'+
    '<h2 class="rtitle">'+r.t+'</h2>'+
    '<p class="rdesc">'+r.d+'</p>'+
    '<div class="srow"><span class="sl">순응 지수</span><div class="strk"><div class="sf" id="sfill" style="width:0%;background:'+r.dc+'"></div></div><span class="snum">'+pct+'%</span></div>'+
    '<div class="rcard"><div class="rct">나타나는 패턴들</div><div class="tl">'+
    r.tr.map(function(x){return'<div class="ti"><div class="td" style="background:'+r.dc+'"></div><span>'+x+'</span></div>';}).join('')+
    '</div></div>'+
    '<div class="bk" id="bkcard">'+
    '<div class="bi"><div class="bklbl">이 테스트는 다음 도서를 통해 만들어졌습니다</div><div class="bkname">포닝 (Fawning)</div><div class="bkauth">잉그리드 클레이튼 지음 | 센시오</div><div class="bkpitch">끝없이 나를 타인에 맞추며 살아가는 사람들을 위한 심리학</div></div>'+
    '</div>'+
    '<div class="buybtns">'+
    '<a href="https://product.kyobobook.co.kr/detail/S000219791221" class="buybtn" target="_blank">📚 교보문고</a>'+
    '<a href="https://aladin.co.kr/shop/wproduct.aspx?ItemId=391385746" class="buybtn" target="_blank">📚 알라딘</a>'+
    '<a href="https://yes24.com/product/goods/188017581" class="buybtn" target="_blank">📚 예스24</a>'+
    '</div>'+
    '<div class="scta"><strong>이 테스트, 주변에 공유해 보세요.</strong><br>\'나도 이런 것 같아\'라는 반응이 놀라울 만큼 많을 거예요. 순응 반응은 누구에게나 있고, 인식하는 것이 치유의 시작입니다.</div>'+
    '<button class="shbtn" id="shb" onclick="shareTest()">🔗 테스트 공유하기</button>'+
    '<button class="rbtn" onclick="retryQ()">↺ 다시 해보기</button>';

  var bk=document.getElementById('bkcard');
  bk.insertBefore(img, bk.firstChild);
  setTimeout(function(){var f=document.getElementById('sfill');if(f)f.style.width=pct+'%';},150);
  window.scrollTo(0,0);
}

function shareTest(){
  var url='https://codegit-rabbit.github.io/Fawning-test/';
  navigator.clipboard.writeText(url).then(function(){
    var btn=document.getElementById('shb');
    btn.classList.add('cp'); btn.textContent='✓ 링크 복사 완료!';
    setTimeout(function(){btn.classList.remove('cp');btn.textContent='🔗 테스트 공유하기';},2500);
  }).catch(function(){alert('복사 실패. URL을 직접 복사해 주세요.');});
}

function retryQ(){
  cq=0;sel=null;score=0;
  document.getElementById('sres').classList.remove('on');
  document.getElementById('si').classList.add('on');
  window.scrollTo(0,0);
}
</script>
